services:
  db:
    image: postgres
    container_name: postgres-db

    env_file:
     - .env 
    
    ports:
     - "5432:5432"
    
    volumes:
     - postg:/var/lib/postgresql
  
  web:
    build: .
    container_name: django-api 

    env_file:
     - .env
    
    ports:
     - "8000:8000"
    
    depends_on:
     - db
    command: >
      sh -c "sleep 5 && python manage.py runserver 0.0.0.0:8000"

volumes:
 postg: